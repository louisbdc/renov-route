name: Deploy to FTP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: renov_route/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: renov_route

      - name: Build
        run: npx next build
        working-directory: renov_route

      - name: Clean stale files from FTP root
        run: |
          sudo apt-get install -y lftp
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" <<'SCRIPT'
          # Remove files/folders deployed to root by mistake (keep www/ and other system dirs)
          glob -a rm -f /*.html
          glob -a rm -f /*.txt
          glob -a rm -f /*.xml
          glob -a rm -f /*.json
          glob -a rm -f /*.js
          glob -a rm -f /*.ico
          glob -a rm -rf /_next
          glob -a rm -rf /assets
          glob -a rm -rf /competences
          glob -a rm -rf /devis
          glob -a rm -rf /faq
          glob -a rm -rf /guides
          glob -a rm -rf /marquage-au-sol-lyon
          glob -a rm -rf /mentions-legales
          glob -a rm -rf /privacy-policy
          glob -a rm -rf /qui-sommes-nous
          glob -a rm -rf /realisations
          rm -f /.ftp-deploy-sync-state.json
          bye
          SCRIPT
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

      - name: Deploy to www/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: renov_route/out/
          server-dir: www/
