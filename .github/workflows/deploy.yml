name: Deploy to FTP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GIT_HASH: ${{ github.sha }}
      NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
      NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${{ vars.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
      NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${{ vars.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}
      NEXT_PUBLIC_EMAILJS_TEMPLATE_ID_DEVIS: ${{ vars.NEXT_PUBLIC_EMAILJS_TEMPLATE_ID_DEVIS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: renov_route/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: renov_route

      - name: Validate public build environment
        run: |
          test -n "$NEXT_PUBLIC_GA_ID" || { echo "Missing NEXT_PUBLIC_GA_ID"; exit 1; }
          test -n "$NEXT_PUBLIC_EMAILJS_SERVICE_ID" || { echo "Missing NEXT_PUBLIC_EMAILJS_SERVICE_ID"; exit 1; }
          test -n "$NEXT_PUBLIC_EMAILJS_PUBLIC_KEY" || { echo "Missing NEXT_PUBLIC_EMAILJS_PUBLIC_KEY"; exit 1; }
          test -n "$NEXT_PUBLIC_EMAILJS_TEMPLATE_ID_DEVIS" || { echo "Missing NEXT_PUBLIC_EMAILJS_TEMPLATE_ID_DEVIS"; exit 1; }
        working-directory: renov_route

      - name: Build
        run: npx next build
        working-directory: renov_route

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: renov_route/out/
          state-name: _ftp-deploy-sync-state.json
          server-dir: www/
